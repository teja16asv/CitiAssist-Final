<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#44403c" /> <!-- stone-700 -->
      <stop offset="100%" stop-color="#1c1917" /> <!-- stone-900 -->
    </linearGradient>
    <filter id="dropshadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/> 
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/> 
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Rounded Square/Squircle -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGradient)" />

  <!-- Civic Icon: Pillar Building -->
  <g transform="translate(106, 120)" filter="url(#dropshadow)">
    <!-- Roof / Pediment -->
    <path d="M150 20 L20 110 H280 L150 20 Z" fill="#f59e0b" stroke="#f59e0b" stroke-width="10" stroke-linejoin="round"/> 
    <!-- Amber-500 for warmth/assistance -->

    <!-- Base -->
    <rect x="20" y="270" width="260" height="40" rx="4" fill="#e7e5e4" /> <!-- stone-200 -->

    <!-- Pillars -->
    <rect x="40" y="120" width="35" height="140" rx="2" fill="#e7e5e4" />
    <rect x="132.5" y="120" width="35" height="140" rx="2" fill="#e7e5e4" />
    <rect x="225" y="120" width="35" height="140" rx="2" fill="#e7e5e4" />
    
    <!-- "Assist" Checkmark or Swosh subtly integrated? 
         Let's keep it clean. The Amber roof signifies the "light/guide".
    -->
  </g>
</svg>
